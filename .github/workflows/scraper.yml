name: Scheduled Scrape

# Runs every 30 minutes via GitHub Actions — no server required.
# GitHub may delay scheduled runs by up to 15 minutes during peak load.
# For sub-15-minute precision, use Docker (see README).

on:
  schedule:
    - cron: "*/30 * * * *"   # every 30 minutes, 24/7
  workflow_dispatch:           # also triggerable manually from the Actions tab

jobs:
  scrape:
    runs-on: ubuntu-22.04   # 24.04 renamed libasound2 → libasound2t64; Playwright 1.44 doesn't handle that
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      # ── Guard: fail fast if secrets haven't been configured ─────────────
      - name: Verify required secrets are set
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
        run: |
          missing=""
          [ -z "$GMAIL_USER" ]         && missing="$missing GMAIL_USER"
          [ -z "$GMAIL_APP_PASSWORD" ] && missing="$missing GMAIL_APP_PASSWORD"
          [ -z "$RECIPIENT_EMAIL" ]    && missing="$missing RECIPIENT_EMAIL"
          if [ -n "$missing" ]; then
            echo "::error::Missing secrets:$missing"
            echo "::error::Go to Settings → Secrets and variables → Actions and add them."
            exit 1
          fi
          echo "All required secrets are present."

      # ── Python setup ─────────────────────────────────────────────────────
      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Playwright Chromium
        run: playwright install chromium --with-deps

      # ── Persist SQLite dedup DB between runs ─────────────────────────────
      - name: Restore dedup database
        uses: actions/cache/restore@v4
        with:
          path: data/contracts.db
          # key won't match (this run_id is new); restore-keys find the latest saved cache
          key: contracts-db-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            contracts-db-${{ github.ref_name }}-
            contracts-db-

      - name: Create data directory
        run: mkdir -p data

      # ── Scrape ───────────────────────────────────────────────────────────
      - name: Run scrape cycle
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}
          DB_PATH: "data/contracts.db"
          PYTHONPATH: "."   # required so "from src.xxx import" resolves
        run: |
          python - <<'PYEOF'
          import logging
          import sys

          logging.basicConfig(
              level=logging.INFO,
              format="%(asctime)s [%(levelname)s] %(message)s",
              stream=sys.stdout,
          )

          from src.config import load_config
          from src.database import ContractDatabase
          from src.email_sender import send_alert
          from src.scrapers.mdot_letting import MDOTLettingScraper
          from src.scrapers.sigma_vss import SigmaVSSScraper

          config = load_config()
          db = ContractDatabase(config["db_path"])

          new_contracts = []
          for ScraperClass in [MDOTLettingScraper, SigmaVSSScraper]:
              found = ScraperClass(config["keywords"]).scrape()
              for c in found:
                  if db.is_new(c):
                      db.mark_seen(c)
                      new_contracts.append(c)

          if new_contracts:
              send_alert(new_contracts, config)
              print(f"✅ Alert sent for {len(new_contracts)} new contract(s)")
          else:
              print(f"ℹ️  No new contracts (total tracked: {db.total_seen()})")
          PYEOF

      # ── Always save the DB so next run can restore it ────────────────────
      - name: Save dedup database
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/contracts.db
          key: contracts-db-${{ github.ref_name }}-${{ github.run_id }}
